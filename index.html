<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeX Ultra</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #020617);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  color: white;
}

@keyframes gradientMove {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  flex-wrap: wrap;
}

.logo {
  font-weight: bold;
  font-size: 18px;
  color: #38bdf8;
}

.nav-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
  width: 100%;
}

/* BUTTONS */
button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #38bdf8;
  color: black;
  transform: scale(1.05);
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
}

/* CARD */
.card {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
}

/* LEVEL */
#level {
  margin-bottom: 10px;
  font-weight: bold;
}

/* XP BAR */
.xp-bar {
  height: 12px;
  background: #1e293b;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 15px;
}

#xp-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #38bdf8, #22c55e);
  transition: width 0.5s ease;
}

/* TEXT */
.quote {
  font-size: 18px;
  line-height: 1.8;
}

/* TYPING */
.correct { color: #22c55e; }
.wrong { color: #ef4444; }

.current {
  border-bottom: 2px solid #38bdf8;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  font-size: 14px;
}

/* HIDDEN INPUT */
input {
  opacity: 0;
  position: absolute;
}

/* MOBILE */
@media (max-width: 500px) {
  .quote {
    font-size: 16px;
  }

  button {
    font-size: 13px;
    padding: 8px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">⚡ TypeX Ultra</div>

  <div class="nav-actions">
    <button onclick="restart()">Restart</button>
    <button onclick="stopTest()">Stop</button>
    <button onclick="nextLevel()">Next ⏭</button>
  </div>
</div>

<div class="main" onclick="focusInput()">
  <div class="card">

    <div id="level">🏆 Level: 1</div>

    <div class="xp-bar">
      <div id="xp-fill"></div>
    </div>

    <div id="quote" class="quote"></div>

    <input id="input">

    <div class="stats">
      <span>⏱ <span id="time">60</span></span>
      <span>⚡ <span id="wpm">0</span></span>
      <span>🎯 <span id="acc">0</span>%</span>
    </div>

  </div>
</div>

<script>
const texts = [
  "Practice makes perfect.",
  "Consistency is the key to mastering any skill.",
  "Success comes to those who work hard and stay consistent every day.",
  "The only way to achieve greatness is to stay focused and keep improving continuously."
];

let level = 0, xp = 0, xpNeed = 100;
let time, timer, started, startTime;
let currentText = "";

const quoteEl = document.getElementById("quote");
const inputEl = document.getElementById("input");

// LOAD TEXT
function loadText() {
  let index = Math.min(level, texts.length - 1);
  currentText = texts[index];

  quoteEl.innerHTML = "";

  currentText.split("").forEach((c,i)=>{
    let span = document.createElement("span");
    span.innerText = c;
    if(i===0) span.classList.add("current");
    quoteEl.appendChild(span);
  });

  document.getElementById("level").innerText = "🏆 Level: " + (level+1);
}

// FOCUS
function focusInput() { inputEl.focus(); }

// TIMER
function startTimer() {
  startTime = new Date();
  timer = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;
    if(time===0) stopTest();
  },1000);
}

// TYPING
inputEl.addEventListener("input", ()=>{
  if(!started){
    startTimer();
    started=true;
  }

  const input = inputEl.value.split("");
  const spans = quoteEl.querySelectorAll("span");

  let correct=0;

  spans.forEach((s,i)=>{
    const ch = input[i];
    s.classList.remove("current");

    if(ch==null){
      s.classList.remove("correct","wrong");
    }
    else if(ch===s.innerText){
      s.classList.add("correct");
      correct++;
    }
    else{
      s.classList.add("wrong");
    }
  });

  if(spans[input.length]){
    spans[input.length].classList.add("current");
  }

  let acc = Math.round((correct/currentText.length)*100);
  document.getElementById("acc").innerText = acc || 0;
});

// CALCULATE
function calculate(){
  let words = inputEl.value.trim().split(/\s+/).length;
  let min = (new Date()-startTime)/60000;
  let wpm = Math.round(words/min);

  document.getElementById("wpm").innerText = wpm||0;

  xp += wpm*2;

  if(xp>=xpNeed){
    xp-=xpNeed;
    level++;
  }

  document.getElementById("xp-fill").style.width = (xp/xpNeed*100)+"%";
}

// STOP
function stopTest(){
  clearInterval(timer);
  inputEl.disabled=true;
  calculate();
}

// RESTART
function restart(){
  clearInterval(timer);
  time=60;
  started=false;

  document.getElementById("time").innerText=time;
  document.getElementById("wpm").innerText=0;
  document.getElementById("acc").innerText=0;

  inputEl.value="";
  inputEl.disabled=false;

  loadText();
}

// NEXT LEVEL
function nextLevel(){
  level++;
  level = Math.min(level, texts.length - 1);
  restart();
}

// INIT
restart();
</script>

</body>
</html>
