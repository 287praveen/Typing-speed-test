<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeX Ultimate</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body {
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(-45deg,#0f172a,#1e293b,#020617);
  color:white;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  padding:10px;
  flex-wrap:wrap;
}

.nav-actions {
  display:flex;
  gap:5px;
  width:100%;
}

button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  width:90%;
  max-width:800px;
}

/* TEXT */
.quote {font-size:18px;line-height:1.6;}
.correct {color:lime;}
.wrong {color:red;}

.current {
  border-bottom:2px solid cyan;
  animation:blink 1s infinite;
}

@keyframes blink {50%{border-color:transparent;}}

/* XP */
.xp-bar {
  height:10px;
  background:#1e293b;
  margin:10px 0;
}

#xp-fill {
  height:100%;
  width:0%;
  background:cyan;
}

/* TROPHY */
#trophyScreen {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#trophyIcon {
  font-size:70px;
  animation:bounce 1s infinite;
}

@keyframes bounce {
  50%{transform:translateY(-10px);}
}

#trophyScreen button {
  width:auto;
  padding:10px 20px;
  margin-top:15px;
  background:cyan;
  color:black;
}

/* CANVAS */
#confetti {
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div class="navbar">
  <div>⚡ TypeX</div>
  <div class="nav-actions">
    <button onclick="restart()">Restart</button>
    <button onclick="stopTest()">Stop</button>
    <button id="nextBtn" onclick="nextLevel()">Next</button>
  </div>
</div>

<div class="main" onclick="focusInput()">
  <div class="card">

    <div id="level">Level 1</div>

    <div class="xp-bar"><div id="xp-fill"></div></div>

    <div id="quote" class="quote"></div>

    <input id="input">

    <div>
      ⏱ <span id="time">60</span> |
      ⚡ <span id="wpm">0</span> |
      🎯 <span id="acc">0</span>%
    </div>

  </div>
</div>

<!-- TROPHY -->
<div id="trophyScreen">
  <h1 id="trophyIcon">🏆</h1>
  <h2>Completed!</h2>

  <p>WPM: <span id="finalWpm"></span></p>
  <p>Accuracy: <span id="finalAcc"></span>%</p>

  <button onclick="restartGame()">Play Again</button>

  <canvas id="confetti"></canvas>
</div>

<script>
const texts = [
  "Practice makes perfect.",
  "Consistency is the key to mastering any skill.",
  "Success comes to those who work hard.",
  "Keep improving every single day."
];

let level=0,xp=0,xpNeed=100;
let time,timer,started,startTime,currentText="";
let confettiRunning=false;

const quoteEl=document.getElementById("quote");
const inputEl=document.getElementById("input");

function loadText(){
  currentText=texts[Math.min(level,texts.length-1)];
  quoteEl.innerHTML="";

  currentText.split("").forEach((c,i)=>{
    let span=document.createElement("span");
    span.innerText=c;
    if(i===0) span.classList.add("current");
    quoteEl.appendChild(span);
  });

  document.getElementById("level").innerText="Level "+(level+1);
}

function focusInput(){inputEl.focus();}

function startTimer(){
  startTime=new Date();
  timer=setInterval(()=>{
    time--;
    document.getElementById("time").innerText=time;
    if(time===0) stopTest();
  },1000);
}

inputEl.addEventListener("input",()=>{
  if(!started){startTimer();started=true;}

  const input=inputEl.value.split("");
  const spans=quoteEl.querySelectorAll("span");

  let correct=0;

  spans.forEach((s,i)=>{
    const ch=input[i];
    s.classList.remove("current");

    if(ch==null){
      s.classList.remove("correct","wrong");
    } else if(ch===s.innerText){
      s.classList.add("correct");
      correct++;
    } else {
      s.classList.add("wrong");
    }
  });

  if(spans[input.length]) spans[input.length].classList.add("current");

  document.getElementById("acc").innerText=
    Math.round((correct/currentText.length)*100)||0;
});

function calculate(){
  let words=inputEl.value.trim().split(/\s+/).length;
  let min=(new Date()-startTime)/60000;
  let wpm=Math.round(words/min);

  document.getElementById("wpm").innerText=wpm||0;

  xp+=wpm*2;

  if(xp>=xpNeed){
    xp-=xpNeed;
    level++;
  }

  document.getElementById("xp-fill").style.width=(xp/xpNeed*100)+"%";
}

function stopTest(){
  clearInterval(timer);
  inputEl.disabled=true;
  calculate();
}

function restart(){
  clearInterval(timer);
  time=60;
  started=false;

  document.getElementById("time").innerText=time;
  document.getElementById("wpm").innerText=0;
  document.getElementById("acc").innerText=0;

  inputEl.value="";
  inputEl.disabled=false;

  loadText();
  updateBtn();
}

function nextLevel(){
  if(level>=texts.length-1){
    showTrophy();
    return;
  }
  level++;
  restart();
}

function updateBtn(){
  document.getElementById("nextBtn").innerText=
    level>=texts.length-1?"Done":"Next";
}

function showTrophy(){
  document.getElementById("trophyScreen").style.display="flex";

  document.getElementById("finalWpm").innerText=
    document.getElementById("wpm").innerText;

  document.getElementById("finalAcc").innerText=
    document.getElementById("acc").innerText;

  startConfetti();
}

/* FIXED CONFETTI */
function startConfetti(){
  const canvas=document.getElementById("confetti");
  const ctx=canvas.getContext("2d");

  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  let pieces=[];
  confettiRunning=true;

  for(let i=0;i<100;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      size:5,
      speed:2+Math.random()*2
    });
  }

  function draw(){
    if(!confettiRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p=>{
      ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
      ctx.fillRect(p.x,p.y,p.size,p.size);
      p.y+=p.speed;
      if(p.y>canvas.height) p.y=0;
    });

    requestAnimationFrame(draw);
  }

  draw();
}

function restartGame(){
  confettiRunning=false;

  level=0;
  xp=0;

  document.getElementById("trophyScreen").style.display="none";

  // clear canvas
  document.getElementById("confetti")
    .getContext("2d")
    .clearRect(0,0,window.innerWidth,window.innerHeight);

  restart();
}

restart();
</script>

</body>
</html>
